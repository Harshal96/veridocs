# Veridocs — nginx site config.
# Used by the Dockerfile, and equally valid for a bare-metal nginx:
# point `root` at the output of `veridocs build` and you're done.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static site: everything resolves to a file or the single page.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Fingerprint-free assets: cache, but allow revalidation on deploy.
    location /assets/ {
        add_header Cache-Control "public, max-age=86400";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
